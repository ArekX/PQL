namespace: tests
suites:
    unit:
        bootstrap: ../bootstrap.php
        path: ./unit
    integration:
        bootstrap: ../integration-bootstrap.php
        path: ./integration
settings:
    shuffle: true
    lint: true
groups:
    # Integration tests that require an external database server. They can be
    # excluded with: codecept run --skip-group db-server
    db-server:
        - tests/integration/Pdo/MySql/MySqlDriverTest.php
        - tests/integration/Pdo/Pgsql/PgsqlDriverTest.php
        - tests/integration/Pdo/SqlSrv/SqlSrvDriverTest.php
paths:
    tests: tests
    output: tests/_output
    support: tests/_support
    data: tests
coverage:
    enabled: true
    include:
        - src/*
     