version: "3.5"

services:
  db:
    image: mariadb:latest
    container_name: pql-mysql-database
    command: --default-authentication-plugin=mysql_native_password --max_allowed_packet=1G
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: 1
      MYSQL_DATABASE: mysql_test
    ports:
      - "3306:3306"
  pgsql:
    image: postgres:latest
    container_name: pql-pgsql-database
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pgsql_test
    ports:
      - "5432:5432"
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64
    container_name: pql-mssql-database
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Str0ngP@ssw0rd!"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"